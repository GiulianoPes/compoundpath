// Simple canvas sparkline
function Sparkline({data,color,width,height}){
  const ref=useRef();
  useEffect(()=>{
    if(!ref.current||!data||data.length<2)return;
    const canvas=ref.current;
    const ctx=canvas.getContext("2d");
    const w=canvas.width,h=canvas.height;
    ctx.clearRect(0,0,w,h);
    const min=Math.min(...data),max=Math.max(...data);
    const range=max-min||1;
    ctx.beginPath();
    ctx.strokeStyle=color;
    ctx.lineWidth=1.5;
    ctx.lineJoin="round";
    data.forEach((v,i)=>{
      const x=(i/(data.length-1))*w;
      const y=h-((v-min)/range)*(h-4)-2;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    });
    ctx.stroke();
  },[data,color]);
  return React.createElement('canvas',{ref,width:width||120,height:height||36,style:{width:"100%",height:36}});
}

// Simple line chart using canvas
function SimpleChart({data,series,darkMode}){
  const ref=useRef();
  useEffect(()=>{
    if(!ref.current||!data||data.length<2)return;
    const canvas=ref.current;
    const ctx=canvas.getContext("2d");
    const W=canvas.width,H=canvas.height;
    const PAD={top:10,right:10,bottom:30,left:50};
    const cW=W-PAD.left-PAD.right,cH=H-PAD.top-PAD.bottom;
    ctx.clearRect(0,0,W,H);
    const textCol=darkMode?"#3A4A5A":"#9AA8B8";
    const gridCol=darkMode?"rgba(255,255,255,0.04)":"rgba(0,0,0,0.06)";
    // find global min/max
    let allVals=[];
    series.forEach(s=>data.forEach(d=>{if(d[s.key]!=null)allVals.push(d[s.key]);}));
    const minV=Math.min(...allVals),maxV=Math.max(...allVals);
    const range=maxV-minV||1;
    const toX=i=>PAD.left+(i/(data.length-1))*cW;
    const toY=v=>PAD.top+cH-((v-minV)/range)*cH;
    // grid lines
    for(let i=0;i<=4;i++){
      const y=PAD.top+(i/4)*cH;
      ctx.beginPath();ctx.strokeStyle=gridCol;ctx.lineWidth=1;
      ctx.moveTo(PAD.left,y);ctx.lineTo(PAD.left+cW,y);ctx.stroke();
      const val=maxV-((maxV-minV)*i/4);
      ctx.fillStyle=textCol;ctx.font="10px DM Sans,sans-serif";ctx.textAlign="right";
      ctx.fillText((val/1000).toFixed(0)+"k",PAD.left-6,y+3);
    }
    // x labels
    const step=Math.floor(data.length/6);
    data.forEach((d,i)=>{
      if(i%step===0){
        ctx.fillStyle=textCol;ctx.font="10px DM Sans,sans-serif";ctx.textAlign="center";
        ctx.fillText(d.label,toX(i),H-8);
      }
    });
    // draw series
    series.forEach(s=>{
      const pts=data.map((d,i)=>({x:toX(i),y:d[s.key]!=null?toY(d[s.key]):null})).filter(p=>p.y!=null);
      if(pts.length<2)return;
      // fill
      ctx.beginPath();
      ctx.moveTo(pts[0].x,PAD.top+cH);
      pts.forEach(p=>ctx.lineTo(p.x,p.y));
      ctx.lineTo(pts[pts.length-1].x,PAD.top+cH);
      ctx.closePath();
      const grad=ctx.createLinearGradient(0,PAD.top,0,PAD.top+cH);
      const toAlpha=(c,a)=>c.startsWith('#')?c+a:c.replace(/[\d.]+\)$/,parseFloat("0x"+a)/255+")");
      grad.addColorStop(0,toAlpha(s.color,"40"));
      grad.addColorStop(1,toAlpha(s.color,"00"));
      ctx.fillStyle=grad;ctx.fill();
      // line
      ctx.beginPath();ctx.strokeStyle=s.color;ctx.lineWidth=s.width||2;ctx.lineJoin="round";
      pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
      ctx.stroke();
    });
  },[data,series,darkMode]);
  return React.createElement('canvas',{ref,width:800,height:280,style:{width:"100%",height:280}});
}

        "Top Performers",e('span',{style:{flex:1,height:1,background:border}})),

                  )

// ── SIMULATOR ─────────────────────────────────────────────────────────────────
function Simulator({onBack,dark}){
  const [query,setQuery]=useState("");
  const [results,setResults]=useState([]);
  const [portfolio,setPortfolio]=useState([]);
  const [simulating,setSimulating]=useState(false);
  const [chartData,setChartData]=useState([]);
  const [stats,setStats]=useState(null);
  const [activeTab,setActiveTab]=useState("portfolio");
  const dropRef=useRef();

  const searchTimer=useRef(null);
  useEffect(()=>{
    if(!query||query.length<2){setResults([]);return;}
    setResults(searchCat(query));
    clearTimeout(searchTimer.current);
    searchTimer.current=setTimeout(async()=>{
      const remote=await searchBackend(query);
      if(remote.length>0){
        setResults(prev=>{
          const tickers=new Set(prev.map(x=>x.ticker));
          const extra=remote.filter(x=>!tickers.has(x.ticker));
          return [...prev,...extra].slice(0,10);
        });
      }
    },300);
    return()=>clearTimeout(searchTimer.current);
  },[query]);
  useEffect(()=>{
    function h(e){if(dropRef.current&&!dropRef.current.contains(e.target))setResults([]);}
    document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);
  },[]);

  function addInst(inst){
    if(portfolio.find(p=>p.ticker===inst.ticker))return;
    setPortfolio(prev=>[...prev,{id:Date.now(),...inst,monthly:100,startDate:"2015-01-01",startTime:"09:30",color:COLORS[prev.length%COLORS.length]}]);
    setQuery("");setResults([]);setChartData([]);setStats(null);
  }
  function removeInst(id){setPortfolio(prev=>prev.filter(p=>p.id!==id));setChartData([]);setStats(null);}
  function updateInst(id,k,v){setPortfolio(prev=>prev.map(p=>p.id===id?{...p,[k]:v}:p));setChartData([]);setStats(null);}

  const simulate=useCallback(async()=>{
    if(!portfolio.length)return;
    setSimulating(true);setChartData([]);setStats(null);
    const fetched=await Promise.all(portfolio.map(async(inst)=>{
      try{
        const startTs=Math.floor(new Date(`${inst.startDate}T${inst.startTime}:00`).getTime()/1000);
        const r=await fetch(`/api/chart?ticker=${inst.ticker}&interval=1mo&period1=${startTs}&period2=${Math.floor(Date.now()/1000)}`);
        const parsed=await r.json();
        if(!parsed.timestamps)throw new Error(parsed.error||"no data");
        const ts=parsed.timestamps;
        const closes=parsed.closes;
        let shares=0,totalInvested=0;
        const monthly=[];
        for(let i=0;i<ts.length;i++){
          if(closes[i]==null)continue;
          shares+=inst.monthly/closes[i];totalInvested+=inst.monthly;
          const d=new Date(ts[i]*1000);
          monthly.push({date:d.toISOString().slice(0,7),label:d.toLocaleDateString("it-IT",{month:"short",year:"2-digit"}),invested:Math.round(totalInvested),value:Math.round(shares*closes[i])});
        }
        return{...inst,monthly,ok:true};
      }catch(e){return{...inst,monthly:[],ok:false};}
    }));
    const allDates=[...new Set(fetched.flatMap(r=>r.monthly.map(m=>m.date)))].sort();
    const combined=allDates.map(date=>{
      const point={date,label:date.slice(0,7)};
      let tI=0,tV=0;
      fetched.forEach(r=>{const m=r.monthly.find(x=>x.date===date);if(m){point["val_"+r.ticker]=m.value;tI+=m.invested;tV+=m.value;}});
      point.totalInvested=Math.round(tI);point.totalValue=Math.round(tV);return point;
    });
    const last=combined[combined.length-1]||{};
    const tI=last.totalInvested||0,tV=last.totalValue||0,gain=tV-tI,pct=tI>0?(gain/tI)*100:0;
    const y0=new Date(allDates[0]+"-01"),y1=new Date(allDates[allDates.length-1]+"-01");
    const years=(y1-y0)/(1000*60*60*24*365.25);
    const cagr=years>0&&tI>0?(Math.pow(tV/tI,1/years)-1)*100:0;
    const instStats=fetched.map(r=>{const l=r.monthly[r.monthly.length-1];if(!l)return{...r,invested:0,value:0,gain:0,pct:0};const g=l.value-l.invested;return{...r,invested:l.invested,value:l.value,gain:g,pct:l.invested>0?(g/l.invested)*100:0};});
    setChartData(combined);setStats({totalInvested:tI,totalValue:tV,gain,pct,cagr,years,instStats});setActiveTab("results");setSimulating(false);
  },[portfolio]);

  const bg2=dark?"#0A0F1A":"#FFFFFF";
  const bg3=dark?"#0F1726":"#EEF1F7";
  const bg4=dark?"#080D14":"#F4F6FA";
  const text=dark?"#E8EDF3":"#0D1520";
  const text2=dark?"#5A6A7A":"#5A6A80";
  const text3=dark?"#2A3A4A":"#9AA8B8";
  const border=dark?"rgba(255,255,255,0.07)":"rgba(0,0,0,0.07)";
  const card=dark?"rgba(255,255,255,0.025)":"rgba(0,0,0,0.02)";
  const e=React.createElement;

  const chartSeries=[
    {key:"totalInvested",color:"rgba(255,255,255,0.3)",width:1.5,dash:true,name:t.invested},
    ...portfolio.map(inst=>({key:"val_"+inst.ticker,color:inst.color,width:2,name:inst.ticker})),
    ...(portfolio.length>1?[{key:"totalValue",color:"#FFFFFF",width:2.5,name:"Total"}]:[]),
  ];

  return e('div',{style:{minHeight:"100vh",background:bg4,color:text,fontFamily:"'DM Sans',system-ui,sans-serif"}},
    e('nav',{style:{background:bg2,borderBottom:`1px solid ${border}`,padding:"0 20px",height:52,display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100}},
      e('div',{style:{display:"flex",alignItems:"center",gap:10}},
        e('button',{onClick:onBack,style:{background:"transparent",border:`1px solid ${border}`,borderRadius:8,color:text2,padding:"4px 12px",fontSize:12,cursor:"pointer"}},"← Home"),
        e('div',{style:{fontSize:15,fontWeight:700,letterSpacing:-0.5,color:text}},"Compound",e('span',{style:{color:"#00C896"}},"Path"),e('span',{style:{fontSize:11,color:text3,fontWeight:400,marginLeft:6}},"Simulator"))
      )
    ),
    e('div',{style:{maxWidth:860,margin:"0 auto",padding:"24px 16px"}},
      e('div',{style:{marginBottom:18}},
        e('h1',{style:{fontSize:"clamp(18px,4vw,24px)",fontWeight:700,letterSpacing:-0.5,marginBottom:4,color:text}},"PAC Portfolio Simulator"),
        e('p',{style:{color:text2,fontSize:13}},"Real historical data · Any ETF, stock, fund or crypto")
      ),
      e('div',{style:{position:"relative",marginBottom:14},ref:dropRef},
        e('div',{style:{position:"relative"}},
          e('span',{style:{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",color:text3,fontSize:15}},"🔍"),
          e('input',{value:query,onChange:ev=>setQuery(ev.target.value),placeholder:"Search by ISIN, ticker or name (e.g. IE00B4L5Y983, IWDA, MSCI World)...",style:{width:"100%",background:bg2,border:`1.5px solid ${border}`,borderRadius:12,color:text,padding:"12px 16px 12px 40px",fontSize:14,outline:"none"}})
        ),
        results.length>0&&e('div',{style:{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,background:bg2,border:`1px solid ${border}`,borderRadius:12,zIndex:50,overflow:"hidden",boxShadow:"0 12px 40px rgba(0,0,0,0.4)"}},
          results.map(r=>e('div',{key:r.ticker,onClick:()=>addInst(r),style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 16px",cursor:"pointer",borderBottom:`1px solid ${border}`},
            onMouseEnter:ev=>ev.currentTarget.style.background=dark?"rgba(255,255,255,0.04)":"rgba(0,0,0,0.03)",
            onMouseLeave:ev=>ev.currentTarget.style.background="transparent"},
            e('div',{style:{display:"flex",alignItems:"center",gap:10}},
              e('span',{style:{fontWeight:700,fontSize:13,minWidth:76,color:text}},r.ticker),
              e('span',{style:{color:text2,fontSize:13}},r.name)
            ),
            e('div',{style:{display:"flex",gap:8,alignItems:"center",flexShrink:0}},
              e('span',{style:{fontSize:10,fontWeight:600,padding:"2px 7px",borderRadius:5,background:(TYPE_COLOR[r.type]||"#00C896")+"20",color:TYPE_COLOR[r.type]||"#00C896"}},r.type),
              e('span',{style:{fontSize:11,color:text3}},r.isin)
            )
          ))
        )
      ),
      portfolio.length>0&&e('div',{style:{display:"flex",gap:4,background:bg3,borderRadius:10,padding:4,marginBottom:14,width:"fit-content"}},
        [["portfolio","📋 Portfolio ("+portfolio.length+")"],["results","📊 Results"]].map(([v,l])=>
          e('button',{key:v,onClick:()=>setActiveTab(v),style:{background:activeTab===v?"#00C896":"transparent",border:"none",borderRadius:8,color:activeTab===v?"#000":text2,padding:"6px 16px",fontSize:13,fontWeight:600,cursor:"pointer"}},l)
        )
      ),
      activeTab==="portfolio"&&e('div',null,
        portfolio.length===0?e('div',{style:{background:card,border:`1px dashed ${border}`,borderRadius:14,padding:"44px 20px",textAlign:"center",color:text3,marginBottom:18}},
          e('div',{style:{fontSize:32,marginBottom:10}},"📊"),e('p',{style:{fontSize:14}},"Search and add instruments above to start simulating")):
        e('div',{style:{display:"flex",flexDirection:"column",gap:10,marginBottom:14}},
          portfolio.map(inst=>e('div',{key:inst.id,style:{background:card,border:`1px solid ${border}`,borderLeft:`3px solid ${inst.color}`,borderRadius:12,padding:"13px 15px"}},
            e('div',{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}},
              e('div',{style:{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}},
                e('div',{style:{width:8,height:8,borderRadius:"50%",background:inst.color,flexShrink:0}}),
                e('span',{style:{fontWeight:700,fontSize:14,color:text}},inst.ticker),
                e('span',{style:{color:text2,fontSize:12}},inst.name),
                e('span',{style:{fontSize:10,fontWeight:600,padding:"2px 7px",borderRadius:5,background:(TYPE_COLOR[inst.type]||"#00C896")+"20",color:TYPE_COLOR[inst.type]||"#00C896"}},inst.type)
              ),
              e('button',{onClick:()=>removeInst(inst.id),style:{background:"transparent",border:"1px solid rgba(255,77,77,0.25)",borderRadius:6,color:"rgba(255,77,77,0.7)",padding:"3px 9px",fontSize:12,cursor:"pointer",flexShrink:0}},"✕")
            ),
            e('div',{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(110px,1fr))",gap:8}},
              e('div',null,e('label',{style:{fontSize:10,color:text3,textTransform:"uppercase",letterSpacing:0.8,display:"block",marginBottom:3}},"Start date"),e('input',{type:"date",value:inst.startDate,onChange:ev=>updateInst(inst.id,"startDate",ev.target.value),style:{width:"100%",background:bg4,border:`1px solid ${border}`,borderRadius:8,color:text,padding:"7px 9px",fontSize:13,outline:"none"}})),
              e('div',null,e('label',{style:{fontSize:10,color:text3,textTransform:"uppercase",letterSpacing:0.8,display:"block",marginBottom:3}},"Time"),e('input',{type:"time",value:inst.startTime,onChange:ev=>updateInst(inst.id,"startTime",ev.target.value),style:{width:"100%",background:bg4,border:`1px solid ${border}`,borderRadius:8,color:text,padding:"7px 9px",fontSize:13,outline:"none"}})),
              e('div',null,e('label',{style:{fontSize:10,color:text3,textTransform:"uppercase",letterSpacing:0.8,display:"block",marginBottom:3}},"Monthly (€)"),e('div',{style:{position:"relative"}},e('span',{style:{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",color:"#00C896",fontSize:13,fontWeight:700}},"€"),e('input',{type:"number",value:inst.monthly,min:10,step:10,onChange:ev=>updateInst(inst.id,"monthly",Math.max(10,Number(ev.target.value))),style:{width:"100%",background:bg4,border:`1px solid ${border}`,borderRadius:8,color:"#00C896",padding:"7px 9px 7px 20px",fontSize:13,fontWeight:700,outline:"none"}})))
            )
          ))
        ),
        portfolio.length>0&&e('button',{onClick:simulate,disabled:simulating,style:{width:"100%",background:simulating?bg3:"#00C896",border:"none",borderRadius:12,color:simulating?text3:"#000",padding:"13px",fontSize:15,fontWeight:700,cursor:simulating?"not-allowed":"pointer"}},
          simulating?e('span',{style:{display:"flex",alignItems:"center",justifyContent:"center",gap:8}},e('span',{style:{width:15,height:15,border:"2px solid rgba(0,200,150,0.2)",borderTop:"2px solid #00C896",borderRadius:"50%",display:"inline-block",animation:"spin 0.7s linear infinite"}}),"Loading data..."):"▶ Simulate "+portfolio.length+" instrument"+(portfolio.length>1?"s":"")
        )
      ),
      activeTab==="results"&&stats&&e('div',null,
        e('div',{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:10,marginBottom:18}},
          [{label:"Total Invested",value:fmtEur(stats.totalInvested),sub:stats.years.toFixed(1)+" yrs",color:text2},
           {label:"Current Value",value:fmtEur(stats.totalValue),sub:"",color:text},
           {label:"Total Gain",value:fmtEur(stats.gain),sub:fmtPct(stats.pct),color:stats.gain>=0?"#00C896":"#FF4D4D"},
           {label:"Annual Return",value:fmtPct(stats.cagr),sub:"CAGR",color:stats.cagr>=0?"#0099FF":"#FF4D4D"}
          ].map((s,i)=>e('div',{key:i,style:{background:card,border:`1px solid ${border}`,borderRadius:12,padding:"13px",textAlign:"center"}},
            e('p',{style:{fontSize:10,color:text3,textTransform:"uppercase",letterSpacing:0.8,marginBottom:5}},s.label),
            e('p',{style:{fontSize:"clamp(13px,3vw,18px)",fontWeight:700,color:s.color,marginBottom:2}},s.value),
            s.sub&&e('p',{style:{fontSize:11,color:text3}},s.sub)
          ))
        ),
        e('div',{style:{background:card,border:`1px solid ${border}`,borderRadius:14,padding:"16px 8px 8px",marginBottom:14}},
          e(SimpleChart,{data:chartData,series:chartSeries,darkMode:dark})
        ),
        e('div',{style:{display:"flex",flexDirection:"column",gap:8,marginBottom:14}},
          stats.instStats.map(inst=>e('div',{key:inst.ticker,style:{background:card,border:`1px solid ${border}`,borderLeft:`3px solid ${inst.color}`,borderRadius:10,padding:"11px 13px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}},
            e('div',{style:{display:"flex",alignItems:"center",gap:7}},
              e('div',{style:{width:7,height:7,borderRadius:"50%",background:inst.color}}),
              e('span',{style:{fontWeight:600,fontSize:13,color:text}},inst.ticker),
              e('span',{style:{color:text2,fontSize:12}},inst.name)
            ),
            e('div',{style:{display:"flex",gap:14,fontSize:12}},
              e('span',{style:{color:text2}},fmtEur(inst.invested)),
              e('span',{style:{color:text,fontWeight:600}},fmtEur(inst.value)),
              e('span',{style:{color:inst.gain>=0?"#00C896":"#FF4D4D",fontWeight:600}},fmtPct(inst.pct))
            )
          ))
        ),
        e('p',{style:{fontSize:11,color:text3,textAlign:"center",lineHeight:1.5}},"Based on real historical prices · Not financial advice · Past performance does not guarantee future results")
      )
    )
  );
}

  const [page,setPage]=useState("home");

  return page==="simulator"
    ?React.createElement(Simulator,{onBack:()=>setPage("home"),dark})
    :React.createElement(Homepage,{onOpen:()=>setPage("simulator"),dark,setDark});
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
